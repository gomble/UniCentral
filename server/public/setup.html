<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniCentral - Ersteinrichtung</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="auth-page">
    <div id="app">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>UniCentral</h1>
                    <p>Ersteinrichtung</p>
                </div>
                <p class="setup-info">Erstelle dein Administrator-Konto um UniCentral zu nutzen.</p>
                <form @submit.prevent="setup">
                    <div class="form-group">
                        <label for="username">Benutzername</label>
                        <input type="text" id="username" v-model="username" autofocus required>
                    </div>
                    <div class="form-group">
                        <label for="password">Passwort (min. 6 Zeichen)</label>
                        <input type="password" id="password" v-model="password" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label for="password2">Passwort wiederholen</label>
                        <input type="password" id="password2" v-model="password2" required>
                    </div>
                    <div v-if="error" class="error-message">{{ error }}</div>
                    <button type="submit" class="btn btn-primary btn-block" :disabled="loading">
                        {{ loading ? 'Wird eingerichtet...' : 'Einrichtung abschliessen' }}
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const username = ref('');
                const password = ref('');
                const password2 = ref('');
                const error = ref('');
                const loading = ref(false);

                async function setup() {
                    error.value = '';
                    if (password.value !== password2.value) {
                        error.value = 'Passwoerter stimmen nicht ueberein';
                        return;
                    }
                    loading.value = true;
                    try {
                        const res = await fetch('/auth/setup', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: username.value, password: password.value })
                        });
                        const data = await res.json();
                        if (data.success) {
                            window.location.href = '/';
                        } else {
                            error.value = data.error || 'Einrichtung fehlgeschlagen';
                        }
                    } catch (e) {
                        error.value = 'Verbindungsfehler';
                    }
                    loading.value = false;
                }

                return { username, password, password2, error, loading, setup };
            }
        }).mount('#app');
    </script>
</body>
</html>
