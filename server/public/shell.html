<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shell</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #1a1a1a;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #toolbar {
            height: 36px;
            background: #2d2d2d;
            border-bottom: 1px solid #444;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
        }
        #toolbar .title {
            color: #e0e0e0;
            font-size: 13px;
            font-weight: 600;
        }
        #toolbar .host {
            color: #8ab4f8;
            font-size: 12px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 3px;
            padding: 2px 8px;
        }
        #toolbar .spacer { flex: 1; }
        #toolbar button {
            background: #3a3a3a;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 4px 10px;
            font-size: 12px;
            cursor: pointer;
        }
        #toolbar button:hover { background: #4a4a4a; }
        #terminal-container {
            width: 100%;
            height: calc(100% - 37px);
        }
        #status {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ccc;
            font-size: 1rem;
            text-align: center;
        }
        #status .spinner {
            display: inline-block;
            width: 24px; height: 24px;
            border: 3px solid #444;
            border-top-color: #8ab4f8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 0.75rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="toolbar">
        <span class="title">Shell</span>
        <span class="host" id="hostname-badge"></span>
        <span class="spacer"></span>
        <button id="btn-reconnect" title="Neu verbinden">Reconnect</button>
    </div>
    <div id="terminal-container"></div>
    <div id="status">
        <div class="spinner"></div>
        <p>Verbinde...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const machineId = params.get('machineId') || '';
        const hostname = params.get('hostname') || machineId;

        document.getElementById('hostname-badge').textContent = hostname;
        document.title = `Shell: ${hostname}`;

        const statusEl = document.getElementById('status');
        const container = document.getElementById('terminal-container');

        const term = new Terminal({
            cursorBlink: true,
            fontSize: 14,
            fontFamily: "'JetBrains Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace",
            theme: {
                background: '#1a1a1a',
                foreground: '#e0e0e0',
                cursor: '#8ab4f8',
                selectionBackground: '#3a5a8a'
            },
            scrollback: 10000,
            convertEol: false
        });

        const fitAddon = new FitAddon.FitAddon();
        const webLinksAddon = new WebLinksAddon.WebLinksAddon();
        term.loadAddon(fitAddon);
        term.loadAddon(webLinksAddon);

        let ws = null;

        function connect() {
            statusEl.style.display = '';
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            const wsUrl = `${proto}://${location.host}/ws/shell-browser?machineId=${encodeURIComponent(machineId)}`;

            ws = new WebSocket(wsUrl);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                statusEl.style.display = 'none';
                term.open(container);
                fitAddon.fit();
                sendResize();
                term.focus();
            };

            ws.onmessage = (event) => {
                const data = event.data;
                if (data instanceof ArrayBuffer) {
                    term.write(new Uint8Array(data));
                } else {
                    term.write(data);
                }
            };

            ws.onclose = () => {
                term.write('\r\n\x1b[31m--- Verbindung getrennt ---\x1b[0m\r\n');
            };

            ws.onerror = () => {
                statusEl.querySelector('p').textContent = 'Verbindung fehlgeschlagen';
                statusEl.querySelector('.spinner').style.display = 'none';
            };
        }

        function sendResize() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const msg = JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows });
                ws.send(msg);
            }
        }

        term.onData((data) => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(new TextEncoder().encode(data));
            }
        });

        term.onResize(() => {
            sendResize();
        });

        window.addEventListener('resize', () => {
            fitAddon.fit();
        });

        document.getElementById('btn-reconnect').addEventListener('click', () => {
            if (ws) { ws.close(); ws = null; }
            term.clear();
            connect();
        });

        connect();
    </script>
</body>
</html>
