<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Desktop</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #1a1a1a;
            overflow: hidden;
        }
        #screen {
            width: 100%;
            height: 100%;
        }
        #status {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ccc;
            font-family: sans-serif;
            font-size: 1rem;
            text-align: center;
            pointer-events: none;
        }
        #status h2 { color: #fff; margin: 0 0 0.5rem; }
        #status p  { margin: 0; color: #aaa; font-size: 0.85rem; }
        #status .spinner {
            display: inline-block;
            width: 24px; height: 24px;
            border: 3px solid #444;
            border-top-color: #8ab4f8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 0.75rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="screen"></div>
    <div id="status">
        <div class="spinner" id="spinner"></div>
        <h2 id="status-title">Verbinde…</h2>
        <p id="status-msg"></p>
    </div>

    <script type="module">
        import RFB from '/novnc/core/rfb.js';

        const params    = new URLSearchParams(location.search);
        const machineId = params.get('machineId') || '';
        const hostname  = params.get('hostname')  || machineId;

        const statusEl    = document.getElementById('status');
        const statusTitle = document.getElementById('status-title');
        const statusMsg   = document.getElementById('status-msg');
        const spinner     = document.getElementById('spinner');

        function setStatus(title, msg) {
            statusTitle.textContent = title;
            statusMsg.textContent   = msg || '';
        }

        setStatus('Verbinde…', `Lade Verbindungsdaten für ${hostname}…`);

        // Fetch VNC credentials from the server (never exposed in the URL).
        let credentials = { password: '', port: 5900 };
        try {
            const r = await fetch(`/api/vnc/credentials/${encodeURIComponent(machineId)}`);
            if (r.ok) credentials = await r.json();
        } catch (_) {}

        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        const wsUrl = `${proto}://${location.host}/ws/vnc-browser?machineId=${encodeURIComponent(machineId)}&port=${encodeURIComponent(credentials.port || 5900)}`;

        setStatus('Verbinde…', `Starte VNC-Verbindung zu ${hostname}…`);

        // Progressive status messages while waiting for the VNC service to start.
        // setup_vnc + TCP retry can take up to ~90 s on first install.
        const progressMessages = [
            [12, 'VNC-Dienst wird gestartet…'],
            [25, 'Warte auf VNC-Server (Installation läuft)…'],
            [50, 'VNC wird installiert, bitte warten…'],
            [75, 'Fast fertig, VNC-Dienst startet…'],
        ];
        let connectStart = Date.now();
        let progressTimer = setInterval(() => {
            const elapsed = (Date.now() - connectStart) / 1000;
            for (const [sec, msg] of progressMessages) {
                if (elapsed >= sec) {
                    setStatus('Verbinde…', msg);
                }
            }
        }, 3000);

        let rfb;
        try {
            rfb = new RFB(document.getElementById('screen'), wsUrl, {
                credentials: { password: credentials.password || '' }
            });
        } catch (e) {
            clearInterval(progressTimer);
            spinner.style.display = 'none';
            statusTitle.textContent = 'Fehler';
            statusMsg.textContent = e.message;
            throw e;
        }

        rfb.scaleViewport = true;
        rfb.resizeSession = false;

        rfb.addEventListener('connect', () => {
            clearInterval(progressTimer);
            statusEl.style.display = 'none';
            document.title = `Remote: ${hostname}`;
        });

        rfb.addEventListener('disconnect', (e) => {
            clearInterval(progressTimer);
            statusEl.style.display = '';
            spinner.style.display = 'none';
            const reason = e.detail && e.detail.reason ? e.detail.reason : 'Verbindung getrennt';
            statusTitle.textContent = 'Getrennt';
            statusMsg.textContent = reason;
        });

        rfb.addEventListener('credentialsrequired', () => {
            const pwd = prompt(`VNC-Passwort für ${hostname}:`);
            rfb.sendCredentials({ password: pwd || '' });
        });

        rfb.addEventListener('securityfailure', (e) => {
            clearInterval(progressTimer);
            statusEl.style.display = '';
            spinner.style.display = 'none';
            statusTitle.textContent = 'Authentifizierung fehlgeschlagen';
            statusMsg.textContent = (e.detail && e.detail.reason) || '';
        });
    </script>
</body>
</html>
