<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Desktop</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #1a1a1a;
            overflow: hidden;
        }
        #screen {
            width: 100%;
            height: 100%;
        }
        #status {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ccc;
            font-family: sans-serif;
            font-size: 1rem;
            text-align: center;
            pointer-events: none;
        }
        #status h2 { color: #fff; margin: 0 0 0.5rem; }
        #status p  { margin: 0; color: #aaa; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div id="screen"></div>
    <div id="status"><h2>Verbinde…</h2><p id="status-msg"></p></div>

    <script type="module">
        import RFB from '/novnc/rfb.js';

        const params    = new URLSearchParams(location.search);
        const machineId = params.get('machineId') || '';
        const port      = params.get('port')      || '5900';
        const hostname  = params.get('hostname')  || machineId;

        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        const wsUrl = `${proto}://${location.host}/ws/vnc-browser?machineId=${encodeURIComponent(machineId)}&port=${encodeURIComponent(port)}`;

        const statusEl  = document.getElementById('status');
        const statusMsg = document.getElementById('status-msg');

        let rfb;
        try {
            rfb = new RFB(document.getElementById('screen'), wsUrl);
        } catch (e) {
            statusEl.innerHTML = `<h2>Fehler</h2><p>${e.message}</p>`;
            throw e;
        }

        rfb.scaleViewport = true;
        rfb.resizeSession = false;

        rfb.addEventListener('connect', () => {
            statusEl.style.display = 'none';
            document.title = `Remote: ${hostname}`;
        });

        rfb.addEventListener('disconnect', (e) => {
            statusEl.style.display = '';
            const reason = e.detail && e.detail.reason ? e.detail.reason : 'Verbindung getrennt';
            statusEl.innerHTML = `<h2>Getrennt</h2><p>${reason}</p>`;
        });

        rfb.addEventListener('credentialsrequired', () => {
            const password = prompt(`VNC-Passwort für ${hostname}:`);
            rfb.sendCredentials({ password: password || '' });
        });

        rfb.addEventListener('securityfailure', (e) => {
            statusEl.style.display = '';
            statusEl.innerHTML = `<h2>Authentifizierung fehlgeschlagen</h2><p>${(e.detail && e.detail.reason) || ''}</p>`;
        });

        statusMsg.textContent = `Verbinde mit ${hostname}…`;
    </script>
</body>
</html>
