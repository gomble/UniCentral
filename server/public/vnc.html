<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Desktop</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #1a1a1a;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #toolbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 40px;
            background: #2d2d2d;
            border-bottom: 1px solid #444;
            display: none;
            align-items: center;
            padding: 0 8px;
            gap: 4px;
            z-index: 1000;
            overflow-x: auto;
        }
        #toolbar.visible { display: flex; }
        #toolbar button {
            background: #3a3a3a;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 4px 10px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
        }
        #toolbar button:hover { background: #4a4a4a; }
        #toolbar button:active { background: #555; }
        #toolbar button.accent {
            background: #1a5fb4;
            border-color: #2a7fff;
        }
        #toolbar button.accent:hover { background: #2a6fc4; }
        #toolbar .separator {
            width: 1px;
            height: 24px;
            background: #555;
            margin: 0 6px;
        }
        #toolbar .clipboard-group {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
        }
        #toolbar .clipboard-group input {
            background: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            width: 200px;
        }
        #toolbar .clipboard-group input::placeholder { color: #777; }
        #screen {
            width: 100%;
            height: calc(100% - 41px);
            margin-top: 41px;
        }
        #screen.fullscreen {
            height: 100%;
            margin-top: 0;
        }
        #status {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ccc;
            font-family: sans-serif;
            font-size: 1rem;
            text-align: center;
            pointer-events: none;
        }
        #status h2 { color: #fff; margin: 0 0 0.5rem; }
        #status p  { margin: 0; color: #aaa; font-size: 0.85rem; }
        #status .spinner {
            display: inline-block;
            width: 24px; height: 24px;
            border: 3px solid #444;
            border-top-color: #8ab4f8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 0.75rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="toolbar">
        <button id="btn-cad" class="accent" title="Strg+Alt+Entf senden">Strg+Alt+Entf</button>
        <div class="separator"></div>
        <button id="btn-tab" title="Tab-Taste senden">Tab</button>
        <button id="btn-esc" title="Escape-Taste senden">Esc</button>
        <button id="btn-win" title="Windows/Super-Taste senden">Win</button>
        <button id="btn-alt-tab" title="Alt+Tab senden">Alt+Tab</button>
        <button id="btn-alt-f4" title="Alt+F4 senden">Alt+F4</button>
        <div class="separator"></div>
        <button id="btn-f11" title="F11 (Vollbild im Gastrechner)">F11</button>
        <button id="btn-prtsc" title="Druck-Taste senden">Druck</button>
        <div class="separator"></div>
        <div class="clipboard-group">
            <input type="text" id="clipboard-input" placeholder="Text hier eingeben zum Senden..." title="Text eingeben und mit Senden-Button an Remote senden">
            <button id="btn-paste-send" title="Text aus dem Feld an den Remote-Rechner senden">Senden</button>
            <button id="btn-paste-clip" title="Zwischenablage direkt an Remote senden">Einfuegen</button>
            <button id="btn-get-clip" title="Remote-Zwischenablage abholen">Abholen</button>
        </div>
        <div class="separator"></div>
        <button id="btn-fullscreen" title="Toolbar ausblenden (Doppelklick auf oberen Rand zum Wiederherstellen)">Vollbild</button>
    </div>

    <div id="screen"></div>
    <div id="status">
        <div class="spinner" id="spinner"></div>
        <h2 id="status-title">Verbinde...</h2>
        <p id="status-msg"></p>
    </div>

    <script type="module">
        import RFB from '/novnc/core/rfb.js';

        const params    = new URLSearchParams(location.search);
        const machineId = params.get('machineId') || '';
        const hostname  = params.get('hostname')  || machineId;

        const statusEl    = document.getElementById('status');
        const statusTitle = document.getElementById('status-title');
        const statusMsg   = document.getElementById('status-msg');
        const spinner     = document.getElementById('spinner');

        function setStatus(title, msg) {
            statusTitle.textContent = title;
            statusMsg.textContent   = msg || '';
        }

        setStatus('Verbinde...', `Lade Verbindungsdaten fuer ${hostname}...`);

        let credentials = { password: '', port: 5900 };
        try {
            const r = await fetch(`/api/vnc/credentials/${encodeURIComponent(machineId)}`);
            if (r.ok) credentials = await r.json();
        } catch (_) {}

        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        const wsUrl = `${proto}://${location.host}/ws/vnc-browser?machineId=${encodeURIComponent(machineId)}&port=${encodeURIComponent(credentials.port || 5900)}`;

        let rfb;
        let lastRemoteClipboard = '';
        let connected = false;
        let retryCount = 0;
        const maxRetries = 3;
        let progressTimer = null;
        let connectStart = Date.now();

        const progressMessages = [
            [12, 'VNC-Dienst wird gestartet...'],
            [25, 'Warte auf VNC-Server (Installation laeuft)...'],
            [50, 'VNC wird installiert, bitte warten...'],
            [75, 'Fast fertig, VNC-Dienst startet...'],
        ];

        function setupToolbar() {
            const toolbar = document.getElementById('toolbar');
            toolbar.classList.add('visible');

            const XK_Control_L = 0xFFE3;
            const XK_Alt_L     = 0xFFE9;
            const XK_Delete    = 0xFFFF;
            const XK_Tab       = 0xFF09;
            const XK_Escape    = 0xFF1B;
            const XK_Super_L   = 0xFFEB;
            const XK_F4        = 0xFFC1;
            const XK_F11       = 0xFFC8;
            const XK_Print     = 0xFF61;

            function sendKeyCombo(keys) {
                keys.forEach(k => rfb.sendKey(k, null, true));
                keys.slice().reverse().forEach(k => rfb.sendKey(k, null, false));
            }

            document.getElementById('btn-cad').onclick = () => sendKeyCombo([XK_Control_L, XK_Alt_L, XK_Delete]);
            document.getElementById('btn-tab').onclick = () => sendKeyCombo([XK_Tab]);
            document.getElementById('btn-esc').onclick = () => sendKeyCombo([XK_Escape]);
            document.getElementById('btn-win').onclick = () => sendKeyCombo([XK_Super_L]);
            document.getElementById('btn-alt-tab').onclick = () => sendKeyCombo([XK_Alt_L, XK_Tab]);
            document.getElementById('btn-alt-f4').onclick = () => sendKeyCombo([XK_Alt_L, XK_F4]);
            document.getElementById('btn-f11').onclick = () => sendKeyCombo([XK_F11]);
            document.getElementById('btn-prtsc').onclick = () => sendKeyCombo([XK_Print]);

            document.getElementById('btn-paste-send').onclick = () => {
                const text = document.getElementById('clipboard-input').value;
                if (text) { rfb.clipboardPasteFrom(text); document.getElementById('clipboard-input').value = ''; }
            };

            document.getElementById('btn-paste-clip').onclick = async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    if (text) rfb.clipboardPasteFrom(text);
                } catch (e) {
                    const text = prompt('Zwischenablage konnte nicht gelesen werden.\nText manuell eingeben:');
                    if (text) rfb.clipboardPasteFrom(text);
                }
            };

            document.getElementById('btn-get-clip').onclick = () => {
                if (lastRemoteClipboard) {
                    navigator.clipboard.writeText(lastRemoteClipboard).then(
                        () => { document.getElementById('clipboard-input').value = lastRemoteClipboard; },
                        () => { document.getElementById('clipboard-input').value = lastRemoteClipboard; }
                    );
                }
            };

            document.getElementById('btn-fullscreen').onclick = () => {
                toolbar.classList.remove('visible');
                document.getElementById('screen').classList.add('fullscreen');
                rfb.scaleViewport = true;
            };

            document.addEventListener('dblclick', (e) => {
                if (e.clientY < 10 && !toolbar.classList.contains('visible')) {
                    toolbar.classList.add('visible');
                    document.getElementById('screen').classList.remove('fullscreen');
                    rfb.scaleViewport = true;
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.shiftKey && e.altKey && e.key === 'D') {
                    e.preventDefault();
                    toolbar.classList.toggle('visible');
                    document.getElementById('screen').classList.toggle('fullscreen');
                    rfb.scaleViewport = true;
                }
            });

            document.getElementById('clipboard-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); document.getElementById('btn-paste-send').click(); }
            });
        }

        function startVnc() {
            setStatus('Verbinde...', retryCount > 0
                ? `Verbindungsversuch ${retryCount + 1}/${maxRetries + 1} zu ${hostname}...`
                : `Starte VNC-Verbindung zu ${hostname}...`);
            statusEl.style.display = '';
            spinner.style.display = '';

            connectStart = Date.now();
            if (progressTimer) clearInterval(progressTimer);
            progressTimer = setInterval(() => {
                const elapsed = (Date.now() - connectStart) / 1000;
                for (const [sec, msg] of progressMessages) {
                    if (elapsed >= sec) setStatus('Verbinde...', msg);
                }
            }, 3000);

            document.getElementById('screen').innerHTML = '';

            try {
                rfb = new RFB(document.getElementById('screen'), wsUrl, {
                    credentials: { password: credentials.password || '' }
                });
            } catch (e) {
                clearInterval(progressTimer);
                spinner.style.display = 'none';
                statusTitle.textContent = 'Fehler';
                statusMsg.textContent = e.message;
                return;
            }

            rfb.scaleViewport = true;
            rfb.resizeSession = false;

            rfb.addEventListener('clipboard', (e) => {
                if (e.detail && e.detail.text) {
                    lastRemoteClipboard = e.detail.text;
                    navigator.clipboard.writeText(e.detail.text).catch(() => {});
                }
            });

            rfb.addEventListener('connect', () => {
                clearInterval(progressTimer);
                connected = true;
                retryCount = 0;
                statusEl.style.display = 'none';
                document.title = `Remote: ${hostname}`;
                setupToolbar();
            });

            rfb.addEventListener('disconnect', (e) => {
                clearInterval(progressTimer);
                if (!connected && retryCount < maxRetries) {
                    retryCount++;
                    setStatus('Verbinde...', `Erneuter Verbindungsversuch (${retryCount}/${maxRetries})...`);
                    setTimeout(startVnc, 2000);
                    return;
                }
                statusEl.style.display = '';
                spinner.style.display = 'none';
                connected = false;
                const reason = e.detail && e.detail.reason ? e.detail.reason : 'Verbindung getrennt';
                statusTitle.textContent = 'Getrennt';
                statusMsg.textContent = reason;
            });

            rfb.addEventListener('credentialsrequired', () => {
                const pwd = prompt(`VNC-Passwort fuer ${hostname}:`);
                rfb.sendCredentials({ password: pwd || '' });
            });

            rfb.addEventListener('securityfailure', (e) => {
                clearInterval(progressTimer);
                connected = false;
                statusEl.style.display = '';
                spinner.style.display = 'none';
                statusTitle.textContent = 'Authentifizierung fehlgeschlagen';
                statusMsg.textContent = (e.detail && e.detail.reason) || '';
            });
        }

        startVnc();
    </script>
</body>
</html>
