services:
  unicentral:
    build: .
    container_name: unicentral
    ports:
      - "9100:3000"
    environment:
      - NODE_ENV=production
      - BASE_URL=${BASE_URL:-}
      - ENROLLMENT_KEY=${ENROLLMENT_KEY:-}
    volumes:
      - unicentral-data:/app/data
    restart: unless-stopped

volumes:
  unicentral-data:
